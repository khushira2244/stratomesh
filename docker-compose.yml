services:
  postgres:
    image: postgres:16
    container_name: stratomesh-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stratomesh
    ports:
      - "5434:5432"
    volumes:
      - stratomesh_pg:/var/lib/postgresql/data

volumes:
  stratomesh_pg: